name: Build PDF

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/velesnitski/pdf-builder:latest
      options: --user root
    steps:
      - uses: actions/checkout@v4

      - name: Build combined PDF
        shell: bash
        env:
          MERMAID_FILTER_FORMAT: png
          MERMAID_FILTER_THEME: default
          MERMAID_FILTER_BACKGROUND: white
          MERMAID_FILTER_WIDTH: "1100"
          MERMAID_FILTER_SCALE: "1.5"
        run: |
          set +e
          PANDOC_ARGS=(
            README.md
            docs/01-terminal.md
            docs/02-install.md
            docs/03-folders.md
            docs/04-examples.md
            CHEATSHEET.md
            --data-dir /root/.pandoc
            --template eisvogel
            --metadata-file pdf/meta.yml
            --pdf-engine=xelatex
            --listings
            -V geometry:top=0.7in,bottom=0.8in,left=0.65in,right=0.65in
            -V colorlinks=true
            -V linkcolor=NavyBlue
            -V urlcolor=NavyBlue
            -V toccolor=DarkGray
            -V mainfont=DejaVu\ Serif
            -V monofont=DejaVu\ Sans\ Mono
            -V sansfont=DejaVu\ Sans
            -o claude-code-quickstart.pdf
          )

          # Try with mermaid-filter (renders diagrams as PNGs)
          if pandoc "${PANDOC_ARGS[@]}" --filter mermaid-filter; then
            echo "Built PDF with rendered mermaid diagrams"
            exit 0
          fi

          echo "Falling back: build PDF without mermaid-filter"
          pandoc "${PANDOC_ARGS[@]}"

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-code-quickstart-pdf
          path: claude-code-quickstart.pdf

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: claude-code-quickstart.pdf
