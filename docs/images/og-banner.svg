<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-label="Claude Code 5-Minute Quickstart">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F2937"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.03">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Accent rule -->
  <rect x="100" y="170" width="80" height="6" fill="url(#accent)" rx="3"/>

  <!-- Title -->
  <text x="100" y="270" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="84" font-weight="700" letter-spacing="-2">Claude Code</text>
  <text x="100" y="350" fill="#F59E0B" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="60" font-weight="600" letter-spacing="-1">5-Minute Quickstart</text>

  <!-- Subtitle -->
  <text x="100" y="425" fill="#94A3B8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="400">The on-ramp for marketing, content &amp; dev teams.</text>
  <text x="100" y="465" fill="#94A3B8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="400">Twelve minutes. Plain language. Pictures.</text>

  <!-- Footer URL -->
  <text x="100" y="565" fill="#64748B" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22">github.com/velesnitski/claude-code-quickstart</text>

  <!-- Right-side decorative terminal mark -->
  <g transform="translate(900, 220)" opacity="0.85">
    <rect width="280" height="200" rx="12" fill="#0B1220" stroke="#1E293B" stroke-width="1"/>
    <rect width="280" height="28" rx="12" fill="#1E293B"/>
    <rect y="22" width="280" height="6" fill="#1E293B"/>
    <circle cx="18" cy="14" r="5" fill="#ff5f56"/>
    <circle cx="36" cy="14" r="5" fill="#ffbd2e"/>
    <circle cx="54" cy="14" r="5" fill="#27c93f"/>
    <text x="20" y="65" fill="#9CA3AF" font-family="ui-monospace, monospace" font-size="14">$ claude</text>
    <text x="20" y="95" fill="#FBBF24" font-family="ui-monospace, monospace" font-size="14">  ◆ Welcome</text>
    <text x="20" y="125" fill="#60A5FA" font-family="ui-monospace, monospace" font-size="14">  &gt;</text>
    <text x="36" y="125" fill="#E6E6E6" font-family="ui-monospace, monospace" font-size="14">summarize this</text>
    <text x="20" y="165" fill="#9CA3AF" font-family="ui-monospace, monospace" font-size="14">  Reading...</text>
  </g>
</svg>
