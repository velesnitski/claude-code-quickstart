<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" role="img" aria-label="Claude Code terminal session showing a feedback analysis">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1f"/>
      <stop offset="100%" stop-color="#0f0f12"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Page background -->
  <rect width="880" height="540" fill="#f5f4ef"/>

  <!-- Window -->
  <g filter="url(#shadow)">
    <rect x="40" y="30" width="800" height="480" rx="12" fill="url(#bg)"/>
    <!-- Title bar -->
    <rect x="40" y="30" width="800" height="36" rx="12" fill="#262629"/>
    <rect x="40" y="56" width="800" height="10" fill="#262629"/>

    <!-- Traffic lights -->
    <circle cx="64" cy="48" r="6" fill="#ff5f56"/>
    <circle cx="84" cy="48" r="6" fill="#ffbd2e"/>
    <circle cx="104" cy="48" r="6" fill="#27c93f"/>

    <!-- Title -->
    <text x="440" y="52" fill="#9aa0a6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" text-anchor="middle">claude — ~/feedback</text>
  </g>

  <!-- Terminal content -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="15" fill="#e6e6e6">
    <!-- Prompt + command -->
    <text x="68" y="100">
      <tspan fill="#9ca3af">~/feedback</tspan>
      <tspan fill="#34d399"> $ </tspan>
      <tspan fill="#e6e6e6">claude</tspan>
    </text>

    <!-- Welcome -->
    <text x="68" y="138" fill="#facc15">  ◆ Welcome to Claude Code</text>

    <!-- User prompt -->
    <text x="68" y="170">
      <tspan fill="#60a5fa">  &gt; </tspan>
      <tspan fill="#e6e6e6">Read feedback.csv. Find the top 3 themes.</tspan>
    </text>
    <text x="68" y="190" fill="#e6e6e6">    For each: 2 verbatim quotes + suggested fix.</text>

    <!-- Output -->
    <text x="68" y="226" fill="#9ca3af">  Reading 412 rows... done.</text>

    <text x="68" y="262">
      <tspan fill="#fbbf24">  1. </tspan>
      <tspan fill="#e6e6e6">Onboarding friction </tspan>
      <tspan fill="#9ca3af">(87 mentions)</tspan>
    </text>
    <text x="68" y="282" fill="#a7f3d0">     "Took 4 days to figure out the import flow."</text>
    <text x="68" y="302" fill="#a7f3d0">     "Wish there was a setup wizard."</text>
    <text x="68" y="322">
      <tspan fill="#34d399">     → </tspan>
      <tspan fill="#e6e6e6">suggest: build a guided first-run.</tspan>
    </text>

    <text x="68" y="358">
      <tspan fill="#fbbf24">  2. </tspan>
      <tspan fill="#e6e6e6">Pricing confusion </tspan>
      <tspan fill="#9ca3af">(54)</tspan>
    </text>
    <text x="68" y="380">
      <tspan fill="#fbbf24">  3. </tspan>
      <tspan fill="#e6e6e6">Missing export </tspan>
      <tspan fill="#9ca3af">(38)</tspan>
    </text>

    <!-- Cursor -->
    <text x="68" y="430">
      <tspan fill="#60a5fa">  &gt; </tspan>
      <tspan fill="#e6e6e6">_</tspan>
    </text>
  </g>

  <!-- Cursor blink rectangle -->
  <rect x="91" y="418" width="9" height="16" fill="#e6e6e6" opacity="0.85">
    <animate attributeName="opacity" values="0.85;0;0.85" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>
